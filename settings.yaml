          help: 启用结构化数据标记，有利于 SEO
        - $formkit: text
          name: baiduSiteVerification
          label: 百度站点验证
          value: ""
          help: 百度站长平台验证代码
        - $formkit: text
          name: googleSiteVerification
          label: Google 站点验证
          value: ""
          help: Google Search Console 验证代码

    - group: watermark
      label: 水印设置
      formSchema:
        - $formkit: checkbox
          name: enabled
          label: 启用水印
          value: true
          help: 是否在页面各处显示装饰性水印（不影响功能）
        - $formkit: text
          name: text
          label: 水印文字
          value: "Serenity"
          help: 自定义水印显示的文字，默认为站点标题
        - $formkit: select
          name: source
          label: 水印来源
          value: "custom"
          options:
            - label: 自定义文字
              value: custom
            - label: 使用站点标题
              value: siteTitle
          help: 选择水印文字的来源
        - $formkit: number
          name: opacity
          label: 水印透明度
          value: 0.05
          min: 0.01
          max: 0.2
          step: 0.01
          help: 水印的透明度，范围 0.01-0.2，默认 0.05（非常淡）

    - group: projects
      label: 项目展示
      formSchema:
        - $formkit: text
          name: githubToken
          label: GitHub Token (可选)
          placeholder: ghp_xxxxxxxxxxxx
          help: 用于拉取私有仓库或提高 API 请求限制，前往 GitHub Settings > Developer settings > Personal access tokens 创建
        - $formkit: repeater
          name: githubRepos
          label: GitHub 项目列表
          help: 添加你的 GitHub 项目仓库链接，将自动获取项目信息并展示
          value: []
          children:
            - $formkit: text
              name: url
              label: GitHub 仓库链接
              validation: required
              help: 完整的 GitHub 仓库链接，如 https://github.com/username/repo
              placeholder: "https://github.com/username/repo"
            - $formkit: select
              name: ownerType
              label: 项目归属
              value: "mine"
              options:
                - label: 我的项目
                  value: mine
                - label: 收藏项目
                  value: starred
              help: 区分是自己开发的项目还是收藏的他人项目
        - $formkit: repeater
          name: customProjects
          label: 自定义项目列表
          help: 手动添加项目信息，不依赖 GitHub API（适用于 GitHub 无法访问或非 GitHub 项目）
          value: []
          children:
            - $formkit: text
              name: name
              label: 项目名称
              validation: required
              help: 项目的名称
              placeholder: "我的项目"
            - $formkit: text
              name: url
              label: 项目链接
              validation: required
              help: 项目的访问链接
              placeholder: "https://example.com"
            - $formkit: select
              name: ownerType
              label: 项目归属
              value: "mine"
              options:
                - label: 我的项目
                  value: mine
                - label: 收藏项目
                  value: starred
              help: 区分是自己开发的项目还是收藏的他人项目
            - $formkit: textarea
              name: description
              label: 项目描述
              help: 简短描述项目功能
              placeholder: "这是一个很棒的项目..."
            - $formkit: attachment
              name: avatar
              label: 项目头像
              help: 上传项目头像图片，建议尺寸 64x64 或更大
            - $formkit: text
              name: language
              label: 主要语言
              help: 项目使用的主要编程语言
              placeholder: "JavaScript"
            - $formkit: number
              name: stars
              label: Star 数量
              value: 0
              help: 项目的 Star 数量（可选）
            - $formkit: number
              name: forks
              label: Fork 数量
              value: 0
              help: 项目的 Fork 数量（可选）
            - $formkit: text
              name: topics
              label: 项目标签
              help: 多个标签用逗号分隔，如：vue,typescript,ui
              placeholder: "vue,typescript,ui"

    - group: links
      label: 友链页面
      formSchema:
        - $formkit: text
          name: ownerName
          label: 站点名称
          value: ""
          placeholder: "例如：My Blog"
          help: 友链申请区域显示的站点名称，留空则使用基本设置中的站点标题
        - $formkit: text
          name: ownerUrl
          label: 站点链接
          value: ""
          placeholder: "例如：https://example.com"
          help: 友链申请区域显示的站点链接，留空则使用系统站点地址
        - $formkit: attachment
          name: ownerAvatar
          label: 站点头像
          value: ""
          help: 友链申请区域显示的站点头像，留空则使用基本设置中的站点 Logo
        - $formkit: textarea
          name: ownerDescription
          label: 站点描述
          value: ""
          placeholder: "例如：一个技术博客"
          help: 友链申请区域显示的站点描述，留空则使用基本设置中的站点描述
        - $formkit: checkbox
          name: showApplyButton
          label: 显示申请友链按钮
          value: true
          help: 是否在友链申请区域显示"申请友链 ›"按钮
        - $formkit: text
          name: offlineLabel
          label: 失联友链标签
