    - group: about
      label: 关于页面
      formSchema:
        - $formkit: repeater
          name: tagsLeft
          label: 左侧标签
          help: 显示在头像左侧的标签，最多3个
          value:
            - text: "热爱开源"
            - text: "设计爱好者"
            - text: "终身学习"
          children:
            - $formkit: text
              name: text
              label: 标签文字
              validation: required
        - $formkit: repeater
          name: tagsRight
          label: 右侧标签
          help: 显示在头像右侧的标签，最多3个
          value:
            - text: "前端开发"
            - text: "独立开发者"
            - text: "折腾爱好者"
          children:
            - $formkit: text
              name: text
              label: 标签文字
              validation: required
        - $formkit: repeater
          name: skills
          label: 技能列表
          help: 在关于页面显示的技能，最多8个。图标优先级：自定义图片 > Iconify 图标 > 内置图标
          value:
            - name: "JavaScript"
              level: 90
              icon: "js"
              customIcon: ""
              iconifyIcon: ""
              iconColor: ""
            - name: "TypeScript"
              level: 85
              icon: "ts"
              customIcon: ""
              iconifyIcon: ""
              iconColor: ""
            - name: "React"
              level: 88
              icon: "react"
              customIcon: ""
              iconifyIcon: ""
              iconColor: ""
            - name: "Vue"
              level: 82
              icon: "vue"
              customIcon: ""
              iconifyIcon: ""
              iconColor: ""
            - name: "Node.js"
              level: 75
              icon: "node"
              customIcon: ""
              iconifyIcon: ""
              iconColor: ""
            - name: "CSS / Sass"
              level: 92
              icon: "css"
              customIcon: ""
              iconifyIcon: ""
              iconColor: ""
          children:
            - $formkit: text
              name: name
              label: 技能名称
            - $formkit: number
              name: level
              label: 熟练度
              min: 0
              max: 100
              step: 5
            - $formkit: attachment
              name: customIcon
              label: 自定义图标图片
              help: 从附件库选择图标图片（优先级最高），建议正方形 PNG/SVG，尺寸 64x64 以上
            - $formkit: text
              name: iconifyIcon
              label: Iconify 图标
              placeholder: "skill-icons:javascript"
              help: "从 Iconify 图标库输入图标名称（如 skill-icons:javascript、logos:vue），可在 https://icon-sets.iconify.design 查找。优先级高于内置图标"
            - $formkit: select
              name: icon
              label: 内置图标（兜底）
              options:
                - label: 无（使用上方自定义图标）
                  value: none
                - label: JavaScript
                  value: js
                - label: TypeScript
                  value: ts
                - label: React
                  value: react
                - label: Vue
                  value: vue
                - label: Node.js
                  value: node
                - label: CSS
                  value: css
                - label: HTML
                  value: html
                - label: Python
                  value: python
              help: 当自定义图片和 Iconify 图标都为空时，使用此内置图标
            - $formkit: text
              name: iconColor
              label: 图标背景色
              placeholder: "#3178c6"
              help: 自定义图标背景色（CSS 颜色值），留空则使用默认主题色
        - $formkit: textarea
          name: aboutSite
          label: 关于本站
          value: "嗨，欢迎来到我的小站。这里是我记录技术探索、分享生活感悟的地方。\n\n作为一名前端开发者，我热衷于探索新技术，追求简洁优雅的代码。工作之余，我喜欢折腾各种有趣的项目，也会在这里分享一些心得。"
          help: 显示在关于页面的"关于本站"部分
        - $formkit: textarea
          name: siteHistory
          label: 建站历程
          value: "始建于 2024 年，纯个人兴趣建站，记录技术与生活。\n\n最初使用 Hexo 搭建，后迁移至 Halo，体验更现代化的博客系统。\n\n记录生活中的点滴，分享技术探索的心得，收藏有趣的发现，顺便当做备忘录。\n\n经历了多次改版、换主题、折腾服务器，一直靠热爱支撑，毕竟它承载着成长和回忆。"
          help: 显示在关于页面的"建站历程"部分
        - $formkit: checkbox
          name: showForeverBlog
          label: 显示十年之约
          value: true
          help: 是否在关于页面显示十年之约倒计时组件
        - $formkit: checkbox
          name: showMascot
          label: 显示吉祥物
          value: true
          help: 是否在关于页面显示吉祥物（站在卡片上的小人）
        - $formkit: attachment
          name: mascotImage
          label: 吉祥物图片
          value: ""
          help: 自定义吉祥物图片，留空使用默认图片，支持 GIF 动图
        - $formkit: text
          name: mascotText
          label: 吉祥物文字
          value: "嘿，你好啊~"
          help: 吉祥物旁边显示的文字
        - $formkit: text
          name: foreverBlogStartDate
          label: 建站日期
          value: "2024-01-01"
          help: 建站日期，格式：YYYY-MM-DD（如：2024-01-01），用于计算十年之约倒计时
        - $formkit: checkbox
          name: showSteam
          label: 显示 Steam 游戏
          value: false
          help: 是否在关于页面显示 Steam 个人资料卡片（需安装 plugin-steam 插件并在插件设置中配置 API Key 等信息）
        - $formkit: checkbox
          name: showAfdian
          label: 显示爱发电赞助
          value: false
          help: 是否在关于页面显示爱发电赞助者组件（需要安装爱发电插件）
        - $formkit: text
          name: afdianUrl
          label: 爱发电链接
          value: ""
          help: 你的爱发电主页链接，如 https://afdian.net/a/username，留空则不显示"成为赞助者"按钮

    - group: seo
      label: SEO 优化
      formSchema:
        - $formkit: text
          name: keywords
          label: 网站关键词
          value: "博客,技术,前端,开发"
          help: 用逗号分隔，用于 SEO
        - $formkit: checkbox
          name: enableJsonLd
          label: 启用 JSON-LD
