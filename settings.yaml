              min: 16
              max: 40
              step: 1
              help: ICP 备案 Logo 的显示长宽大小，单位为像素
              if: $get(footer_icp_enabled).value
        - $formkit: group
          name: policeConfig
          label: 公安备案设置
          value:
            showPolice: false
            policeRecord: ""
            policeRecordUrl: "http://www.beian.gov.cn/portal/registerSystemInfo"
            policeLogoUrl: ""
            policeLogoSize: 20
          children:
            - $formkit: switch
              id: footer_police_enabled
              name: showPolice
              label: 显示公安备案
              value: false
              help: 在页脚显示公安备案信息
            - $formkit: text
              name: policeRecord
              label: 公安备案号
              value: ""
              help: 公安备案号，留空则不显示
              if: $get(footer_police_enabled).value
            - $formkit: text
              name: policeRecordUrl
              label: 公安备案链接
              value: "http://www.beian.gov.cn/portal/registerSystemInfo"
              help: 公安备案号的跳转链接，默认为公安备案查询页面
              if: $get(footer_police_enabled).value
            - $formkit: attachment
              name: policeLogoUrl
              label: 公安备案 Logo
              value: ""
              help: 从附件库选择公安备案 Logo 图片，留空则显示默认图标
              if: $get(footer_police_enabled).value
            - $formkit: number
              name: policeLogoSize
              label: 公安备案 Logo 大小
              value: 20
              min: 16
              max: 40
              step: 1
              help: 公安备案 Logo 的显示长宽大小，单位为像素
              if: $get(footer_police_enabled).value
        - $formkit: group
          name: runtimeConfig
          label: 运行时间设置
          value:
            showRuntime: false
            startYear: "2024"
            runtimeStartDate: "2024-01-01"
          children:
            - $formkit: switch
              id: footer_runtime_enabled
              name: showRuntime
              label: 显示运行时间
              value: false
              help: 在页脚显示"本站已运行 XX 天 XX 小时 XX 分钟 XX 秒"实时跳动计时
            - $formkit: text
              name: startYear
              label: 建站年份
              value: "2024"
              help: 用于显示版权年份范围
              if: $get(footer_runtime_enabled).value
            - $formkit: text
              name: runtimeStartDate
              label: 建站精确日期
              value: "2024-01-01"
              placeholder: "2024-01-01"
              help: 运行时间的起算日期，格式 YYYY-MM-DD，留空则使用建站年份的1月1日
              if: $get(footer_runtime_enabled).value
        - $formkit: group
          name: onlineStatusConfig
