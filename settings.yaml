apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-Serenity-setting
spec:
  forms:
    - group: basic
      label: 基本设置
      formSchema:
        - $formkit: text
          name: title
          label: 站点标题
          value: "Serenity's Blog"
          help: 显示在浏览器标签和页脚
        - $formkit: attachment
          name: favicon
          label: 浏览器图标 (Favicon)
          help: 显示在浏览器标签上的小图标，建议使用 .ico 或 .png 格式，尺寸 32x32 或 64x64，留空则使用主题默认图标 (ics6.webp)
        - $formkit: text
          name: author
          label: 作者名称
          value: "Serenity"
          help: 用于关于页面和文章署名
        - $formkit: textarea
          name: description
          label: 站点描述
          value: "前端开发者 / 独立开发者 / 博主"
          help: 显示在首页和关于页面
        - $formkit: attachment
          name: logo
          label: 站点Logo
          help: 用于关于页面和友链申请，建议尺寸 200x200，留空则使用头像或主题默认图标 (ics6.webp)
        - $formkit: select
          name: defaultTheme
          label: 默认主题模式
          value: dark
          options:
            - label: 暗色模式
              value: dark
            - label: 亮色模式
              value: light
            - label: 跟随系统
              value: auto
          help: 用户首次访问时的默认主题
        - $formkit: group
          label: 导航图标配置
          children:
            - $formkit: text
              name: iconArchives
              label: 归档图标
              value: "fa-solid fa-box-archive"
              placeholder: "fa-solid fa-box-archive"
              help: 归档页面图标，图标查找：https://fontawesome.com/search?o=r&m=free
            - $formkit: text
              name: iconTags
              label: 标签图标
              value: "fa-solid fa-tags"
              placeholder: "fa-solid fa-tags"
              help: 标签页面图标
            - $formkit: text
              name: iconCategories
              label: 分类图标
              value: "fa-solid fa-folder"
              placeholder: "fa-solid fa-folder"
              help: 分类页面图标
            - $formkit: text
              name: iconAbout
              label: 关于我图标
              value: "fa-solid fa-user"
              placeholder: "fa-solid fa-user"
              help: 关于我页面图标
            - $formkit: text
              name: iconMoments
              label: 碎碎念图标
              value: "fa-solid fa-book"
              placeholder: "fa-solid fa-book"
              help: 碎碎念页面图标
            - $formkit: text
              name: iconLinks
              label: 朋友们图标
              value: "fa-solid fa-link"
              placeholder: "fa-solid fa-link"
              help: 朋友们页面图标
            - $formkit: text
              name: iconGuestbook
              label: 留言板图标
              value: "fa-solid fa-comment"
              placeholder: "fa-solid fa-comment"
              help: 留言板页面图标
            - $formkit: text
              name: iconProjects
              label: 项目集图标
              value: "fa-brands fa-github"
              placeholder: "fa-brands fa-github"
              help: 项目集页面图标
            - $formkit: text
              name: iconPhotos
              label: 图库图标
              value: "fa-solid fa-images"
              placeholder: "fa-solid fa-images"
              help: 图库页面图标
            - $formkit: text
              name: iconFriendsCircle
              label: 朋友圈图标
              value: "fa-solid fa-camera"
              placeholder: "fa-solid fa-camera"
              help: 朋友圈页面图标
            - $formkit: text
              name: iconWishes
              label: 便签墙图标
              value: "fa-solid fa-note-sticky"
              placeholder: "fa-solid fa-note-sticky"
              help: 便签墙页面图标
        - $formkit: repeater
          name: categoryIcons
          label: 分类图标列表
          help: 为每个分类配置自定义图标和颜色，slug 填写分类 URL 中的路径，如 /categories/kai-fa 中的 kai-fa
          children:
            - $formkit: text
              name: slug
              label: 分类 Slug
              validation: required
              placeholder: "例如：kai-fa"
              help: 分类 URL 中的路径，如 /categories/kai-fa 中的 kai-fa
            - $formkit: text
              name: icon
              label: 图标类名
              placeholder: "fa-solid fa-folder"
              help: Font Awesome 图标，如 fa-solid fa-code
            - $formkit: text
              name: color
              label: 图标颜色
              placeholder: "#FF6B6B"
              help: 颜色如 #FF6B6B
        - $formkit: textarea
          name: customHead
          label: 自定义 Head 代码
          help: 在 <head> 标签中插入自定义代码，如统计代码、自定义样式等
        - $formkit: textarea
          name: customScript
          label: 自定义 JavaScript
          help: 在页面底部插入自定义 JavaScript 代码

    - group: hero
      label: 首页头部
      formSchema:
        - $formkit: attachment
          name: avatar
          label: 头像
          help: 建议使用正方形图片，尺寸 400x400 以上，留空则使用主题默认头像 (ics6.webp)
        - $formkit: text
          name: name
          label: 显示名称
          value: "Serenity"
          help: 显示在首页头像下方
        - $formkit: checkbox
          name: enableTypewriter
          label: 启用打字机效果
          value: true
          help: 为首页大标题添加打字机动画效果
        - $formkit: checkbox
          name: enableTypewriterBackspace
          label: 启用打字机回退效果
          value: false
          help: 打字完成后逐字回退再重新打字，形成循环动画。关闭则打完即停
        - $formkit: text
          name: tagline
          label: 个性标语
          value: "热爱可抵岁月漫长"
          help: 显示在名称下方的一句话介绍
        - $formkit: textarea
          name: bio
          label: 个人简介
          value: "一个热爱技术、喜欢折腾的开发者。\n专注于前端开发，偶尔写写后端。\n记录生活，分享技术，探索未知。"
          help: 显示在首页的详细介绍，支持多行
        - $formkit: text
          name: nameColor
          label: 显示名称颜色
          value: ""
          placeholder: "FF6B6B 或 linear-gradient(135deg, FF6B6B, FB966E)"
          help: "自定义显示名称的颜色，支持纯色（如 #FF6B6B）或渐变（如 linear-gradient(135deg, #F596AA, #FB966E)）。留空则使用主题默认颜色（随亮色/暗色切换）。设置后颜色固定，不随主题模式变化"
        - $formkit: text
          name: taglineColor
          label: 个性标语颜色
          value: ""
          placeholder: "333 或 linear-gradient(135deg, 667eea, 764ba2)"
          help: "自定义个性标语的颜色，支持纯色（如 #333333）或渐变（如 linear-gradient(135deg, #667eea, #764ba2)）。留空则使用主题默认颜色。设置后颜色固定，不随主题模式变化"
        - $formkit: text
          name: bioColor
          label: 个人简介颜色
          value: ""
          placeholder: "666 或 linear-gradient(135deg, f093fb, f5576c)"
          help: "自定义个人简介的颜色，支持纯色（如 #666666）或渐变（如 linear-gradient(135deg, #f093fb, #f5576c)）。留空则使用主题默认颜色。设置后颜色固定，不随主题模式变化"
        - $formkit: text
          name: avatarGlowColor
          label: 头像光晕颜色
          value: ""
          placeholder: "#FF6B6B"
          help: "自定义头像浮动光晕的颜色，只支持纯色（如 #FF6B6B）。留空则使用主题强调色"
        - $formkit: text
          name: weatherColor
          label: 天气文字颜色
          value: ""
          placeholder: "#FF6B6B 或 linear-gradient(135deg, #FF6B6B, #FB966E)"
          help: "自定义天气文字颜色。留空或纯色（如 #FF6B6B）为镂空描边效果，渐变（如 linear-gradient(135deg, #FF6B6B, #FB966E)）为渐变填充效果，鼠标悬停均填充"

    - group: welcome
      label: 欢迎页设置
      formSchema:
        - $formkit: checkbox
          name: enabled
          label: 启用欢迎页
          value: true
          help: 首次访问时显示全屏欢迎页，点击任意处进入主页
        - $formkit: checkbox
          name: showMascot
          label: 显示吉祥物
          value: true
          help: 在欢迎页右下角显示吉祥物动画（启用欢迎页后可配置）
        - $formkit: attachment
          name: mascotDark
          label: 暗色模式吉祥物
          help: 上传暗色模式下显示的吉祥物 GIF/图片，留空则使用默认 Babara
        - $formkit: attachment
          name: mascotLight
          label: 亮色模式吉祥物
          help: 上传亮色模式下显示的吉祥物 GIF/图片，留空则使用默认 Kirara
        - $formkit: text
          name: mascotCredit
          label: 吉祥物来源链接
          value: "https://x.com/Seseren_kr"
          help: 吉祥物素材的来源链接，显示为 Twitter/X 图标，留空则不显示
        - $formkit: textarea
          name: sayings
          label: 吉祥物语录
          value: "点击任意处进入哦~\n欢迎来到我的小站~\n今天也要元气满满！\n很高兴见到你~"
          help: 吉祥物气泡随机显示的话语，每行一条

    - group: social
      label: 社交链接
      formSchema:
        - $formkit: repeater
          name: links
          label: 社交链接列表
          help: 添加你的社交媒体链接，支持自定义图标和链接
          value:
            - name: "GitHub"
              url: ""
              icon: "github"
            - name: "Twitter"
              url: ""
              icon: "twitter"
            - name: "Email"
              url: ""
              icon: "email"
          children:
            - $formkit: text
              name: name
              label: 名称
              validation: required
              help: 社交平台名称，如 GitHub、Twitter 等
            - $formkit: text
              name: url
              label: 链接
              validation: required
              help: 完整的链接地址，Email 请填写邮箱地址
            - $formkit: select
              name: icon
              label: 内置图标
              value: "github"
              options:
                - label: GitHub
                  value: github
                - label: Twitter / X
                  value: twitter
                - label: Email
                  value: email
                - label: 微博
                  value: weibo
                - label: 哔哩哔哩
                  value: bilibili
                - label: 知乎
                  value: zhihu
                - label: Telegram
                  value: telegram
                - label: Discord
                  value: discord
              help: 快速选择常见社交图标（当 Iconify 图标为空时使用）
            - $formkit: text
              name: iconifyIcon
              label: Iconify 图标
              placeholder: "mdi:github"
              help: "从 Iconify 图标库输入图标名称（如 mdi:github、ri:twitter-x-fill），可在 https://icon-sets.iconify.design 查找。优先级高于内置图标，留空则使用上方内置图标"
        - $formkit: checkbox
          name: showRss
          label: 显示 RSS 订阅
          value: true
          help: 在首页社交图标区域显示 RSS 订阅图标
        - $formkit: checkbox
          name: enableSponsor
          label: 启用赞助功能
          value: false
          help: 在首页社交图标最右边显示赞助图标
        - $formkit: attachment
          name: sponsorQrCode
          label: 赞助二维码
          help: 上传赞助二维码图片，鼠标悬停时显示
        - $formkit: text
          name: sponsorTitle
          label: 赞助标题
          value: "赞赏支持"
          help: 赞助悬浮层的标题
        - $formkit: text
          name: sponsorText
          label: 赞助说明
          value: "感谢你的支持 ❤️"
          help: 赞助悬浮层的说明文字

    - group: compass
      label: 风向标设置
      formSchema:
        - $formkit: checkbox
          name: enabled
          label: 启用风向标
          value: true
          help: 是否在首页显示风向标导航区域
        - $formkit: text
          name: title
          label: 标题
          value: "风向标"
        - $formkit: text
          name: subtitle
          label: 副标题
          value: "快速导航到你想去的地方"
        - $formkit: checkbox
          name: showArchives
          label: 显示归档链接
          value: true
        - $formkit: checkbox
          name: showTags
          label: 显示标签链接
          value: true
        - $formkit: checkbox
          name: showCategories
          label: 显示分类链接
          value: true
        - $formkit: checkbox
          name: showAbout
          label: 显示关于我链接
          value: true
        - $formkit: checkbox
          name: showMoments
          label: 显示碎碎念链接
          value: true
        - $formkit: checkbox
          name: showLinks
          label: 显示朋友们链接
          value: true
        - $formkit: checkbox
          name: showGuestbook
          label: 显示留言板链接
          value: true
        - $formkit: checkbox
          name: showProjects
          label: 显示项目集链接
          value: true
        - $formkit: checkbox
          name: showPhotos
          label: 显示图库链接
          value: true
        - $formkit: checkbox
          name: showFriendsCircle
          label: 显示朋友圈链接
          value: true
        - $formkit: checkbox
          name: showWishes
          label: 显示便签墙链接
          value: true

    - group: home
      label: 首页内容
      formSchema:
        - $formkit: checkbox
          name: showHeroBackground
          label: 显示首页背景壁纸
          value: true
          help: 在首页第一屏显示背景壁纸，滚动时逐渐模糊消失。提示：为避免影响观感，建议背景壁纸和装饰图片只启用其一
        - $formkit: attachment
          name: heroBackground
          label: 背景壁纸图片/视频
          help: 上传首页背景壁纸（支持图片或 MP4/WebM 视频），留空则使用默认图片或 API
        - $formkit: text
          name: heroBackgroundApi
          label: 桌面端背景 API
          value: ""
          help: 背景 API 地址，每行一个图片 URL，支持 API 返回多行 URL，留空则使用上传的图片
        - $formkit: text
          name: heroBackgroundApiMobile
          label: 移动端背景 API
          value: ""
          help: 移动端专用 API，留空则使用桌面端 API
        - $formkit: checkbox
          name: showThemeDecor
          label: 显示主题装饰图片
          value: false
          help: 在首页头部显示主题切换的装饰图片。提示：为避免影响观感，建议背景壁纸和装饰图片只启用其一
        - $formkit: attachment
          name: customDecorLight
          label: 自定义亮色装饰图片
          help: 上传自定义的亮色模式装饰图片，留空则使用默认图片
        - $formkit: attachment
          name: customDecorDark
          label: 自定义暗色装饰图片
          help: 上传自定义的暗色模式装饰图片，留空则使用默认图片
        - $formkit: checkbox
          name: showWeatherClock
          label: 显示天气时钟
          value: false
          help: 在首页头像下方显示时间、城市、天气、温度信息
        - $formkit: text
          name: seniverseKey
          label: 心知天气 API Key
          placeholder: 请输入心知天气 API Key
          help: 前往 https://www.seniverse.com 注册获取，免费版即可，自动根据访客 IP 定位
        - $formkit: checkbox
          name: showRecentPosts
          label: 显示近期笔记
          value: false
          help: 在首页显示最新文章列表
        - $formkit: checkbox
          name: showActivity
          label: 显示站点动态
          value: false
          help: 在首页显示最新文章、碎碎念等动态流
        - $formkit: checkbox
          name: showMemoCards
          label: 显示随想碎片
          value: false
          help: 在首页显示随想碎片卡片轮播
        - $formkit: checkbox
          name: showLifeMoments
          label: 显示生活回想
          value: false
          help: 在首页显示生活回想（碎碎念图片展示）

    - group: post
      label: 文章页面
      formSchema:
        - $formkit: repeater
          name: sidebarOrder
          label: 侧边栏组件顺序
          help: 拖动调整侧边栏组件的显示顺序
          value:
            - component: "toc"
              enabled: true
            - component: "author"
              enabled: true
            - component: "related"
              enabled: true
            - component: "tags"
              enabled: true
          children:
            - $formkit: select
              name: component
              label: 组件类型
              value: "toc"
              options:
                - label: 文章目录
                  value: toc
                - label: 作者信息
                  value: author
                - label: 相关文章
                  value: related
                - label: 热门标签
                  value: tags
              help: 选择侧边栏组件类型
            - $formkit: checkbox
              name: enabled
              label: 启用
              value: true
              help: 是否显示该组件
        - $formkit: number
          name: relatedCount
          label: 相关文章数量
          value: 3
          min: 2
          max: 6
          step: 1
          help: 相关文章组件显示的文章数量
        - $formkit: checkbox
          name: showScrollbar
          label: 显示页面滚动条
          value: false
          help: 在文章详情页右侧显示一个跟随主题色的细滚动条，默认隐藏
        - $formkit: checkbox
          name: showOutdatedNotice
          label: 显示文章过期提示
          value: true
          help: 文章发布超过一定天数后，在文章顶部显示"本文发布于 X 天前"的时效性提示
        - $formkit: checkbox
          name: enableBackground
          label: 启用背景壁纸
          value: false
          help: 在文章详情页顶部显示随机背景壁纸
        - $formkit: text
          name: backgroundApi
          label: 背景壁纸 API
          value: "https://api.elaina.cat/random"
          help: 壁纸 API 地址，每行一个图片 URL，支持 API 返回多行 URL（每行一个）
        - $formkit: text
          name: backgroundApiMobile
          label: 移动端壁纸 API
          value: "https://api.elaina.cat/random/mobile"
          help: 移动端专用 API，留空则使用桌面端 API
        - $formkit: number
          name: backgroundBlur
          label: 背景模糊程度
          value: 3
          min: 0
          max: 20
          step: 1
          help: 背景图片的模糊程度，数值越大越模糊，0 为不模糊
        - $formkit: checkbox
          name: showCopyright
          label: 显示版权信息
          value: true
          help: 在文章底部显示版权声明
        - $formkit: textarea
          name: copyrightText
          label: 版权声明文字
          value: "本文采用 <a href=\"https://creativecommons.org/licenses/by-nc-sa/4.0/\" target=\"_blank\" class=\"copyright-license\">CC BY-NC-SA 4.0</a> 许可协议，转载请注明出处。"
        - $formkit: checkbox
          name: showShare
          label: 显示分享按钮
          value: true
          help: 在文章底部显示分享按钮（复制链接、微博、微信、QQ）
        - $formkit: checkbox
          name: showReward
          label: 显示打赏组件
          value: false
          help: 在文章底部显示打赏组件
        - $formkit: attachment
          name: rewardQrCode
          label: 打赏二维码
          help: 上传打赏二维码图片
        - $formkit: text
          name: rewardTitle
          label: 打赏标题
          value: "赞赏支持"
          help: 打赏组件的标题
        - $formkit: textarea
          name: rewardText
          label: 打赏说明
          value: "如果觉得文章对你有帮助，可以请作者喝杯咖啡 ☕"
          help: 打赏组件的说明文字

    - group: footer
      label: 页脚设置
      formSchema:
        - $formkit: text
          name: icp
          label: ICP 备案号
          value: ""
          help: 网站备案号，留空则不显示
        - $formkit: text
          name: icpUrl
          label: ICP 备案链接
          value: "https://beian.miit.gov.cn/"
          help: ICP 备案号的跳转链接，默认为工信部备案查询页面
        - $formkit: attachment
          name: icpLogoUrl
          label: ICP 备案 Logo
          value: ""
          help: 从附件库选择 ICP 备案 Logo 图片，留空则显示默认图标
        - $formkit: number
          name: icpLogoSize
          label: ICP 备案 Logo 大小
          value: 20
          min: 16
          max: 40
          step: 1
          help: ICP 备案 Logo 的显示长宽大小，单位为像素
        - $formkit: text
          name: policeRecord
          label: 公安备案号
          value: ""
          help: 公安备案号，留空则不显示
        - $formkit: text
