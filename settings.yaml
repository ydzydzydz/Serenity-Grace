apiVersion: v1alpha1
kind: Setting
metadata:
  name: theme-Serenity-setting
spec:
  forms:
    - group: basic
      label: 基本设置
      formSchema:
        - $formkit: group
          name: siteInfo
          label: 站点信息
          value:
            title: "Serenity's Blog"
            author: "Serenity"
            description: "前端开发者 / 独立开发者 / 博主"
          children:
            - $formkit: text
              name: title
              label: 站点标题
              value: "Serenity's Blog"
              help: 显示在浏览器标签和页脚
            - $formkit: text
              name: author
              label: 作者名称
              value: "Serenity"
              help: 用于关于页面和文章署名
            - $formkit: textarea
              name: description
              label: 站点描述
              value: "前端开发者 / 独立开发者 / 博主"
              help: 显示在首页和关于页面
        - $formkit: select
          name: defaultTheme
          label: 默认主题模式
          value: dark
          options:
            - label: 暗色模式
              value: dark
            - label: 亮色模式
              value: light
            - label: 跟随系统
              value: auto
          help: 用户首次访问时的默认主题
        - $formkit: group
          name: typographyConfig
          label: 全站文字样式
          value:
            enabled: false
            globalFont: ""
          children:
            - $formkit: switch
              id: typography_enabled
              name: enabled
              label: 启用全站文字样式
              value: false
              help: 启用后统一应用一个全局字体（仅字体，不修改字号和字重）
            - $formkit: select
              name: globalFont
              label: 全局字体（单选）
              value: ""
              if: $get(typography_enabled).value
              options:
                - label: 主题默认
                  value: ""
                - label: 思源黑体（Noto Sans SC）
                  value: "noto_sans_sc"
                - label: 苹方（PingFang SC）
                  value: "pingfang_sc"
                - label: 微软雅黑（Microsoft YaHei）
                  value: "microsoft_yahei"
                - label: 霞鹜文楷（可爱）
                  value: "lxgw_wenkai"
                - label: 得意黑（Smiley Sans，可爱）
                  value: "smiley_sans"
                - label: 站酷快乐体（可爱）
                  value: "zcool_kuaile"
                - label: 幼圆（可爱）
                  value: "youyuan"
                - label: 华文圆体（可爱）
                  value: "styuanti"
                - label: 华文楷体（手写）
                  value: "stkaiti"
                - label: 华文行楷（手写）
                  value: "stxingkai"
                - label: HarmonyOS Sans SC（鸿蒙）
                  value: "harmonyos_sans_sc"
                - label: MiSans（小米）
                  value: "misans"
                - label: Inter（英文）
                  value: "inter"
              help: 选择后会覆盖全站文字样式（包括正文、标题、代码等）
        - $formkit: group
          name: watermarkConfig
          label: 水印设置
          value:
            watermarkEnabled: true
            watermarkText: "Serenity"
            watermarkSource: "custom"
            watermarkOpacity: 0.05
          children:
            - $formkit: switch
              id: watermark_enabled
              name: watermarkEnabled
              label: 启用水印
              value: true
              help: 是否在页面各处显示装饰性水印（不影响功能）
            - $formkit: text
              name: watermarkText
              label: 水印文字
              value: "Serenity"
              if: $get(watermark_enabled).value
              help: 自定义水印显示的文字，默认为站点标题
            - $formkit: select
              name: watermarkSource
              label: 水印来源
              value: "custom"
              if: $get(watermark_enabled).value
              options:
                - label: 自定义文字
                  value: custom
                - label: 使用站点标题
                  value: siteTitle
              help: 选择水印文字的来源
            - $formkit: number
              name: watermarkOpacity
              label: 水印透明度
              value: 0.05
              min: 0.01
              max: 0.2
              step: 0.01
              if: $get(watermark_enabled).value
              help: 水印的透明度，范围 0.01-0.2，默认 0.05（非常淡）
        - $formkit: group
          name: navIcons
          label: 导航图标配置
          value:
            iconArchives: "fa-solid fa-box-archive"
            iconTags: "fa-solid fa-tags"
            iconCategories: "fa-solid fa-folder"
            iconAbout: "fa-solid fa-user"
            iconMoments: "fa-solid fa-book"
            iconLinks: "fa-solid fa-link"
            iconGuestbook: "fa-solid fa-comment"
            iconProjects: "fa-brands fa-github"
            iconPhotos: "fa-solid fa-images"
            iconFriendsCircle: "fa-solid fa-camera"
            iconWishes: "fa-solid fa-note-sticky"
            iconEquipments: "fa-solid fa-toolbox"
          children:
            - $formkit: text
              name: iconArchives
              label: 归档图标
              value: "fa-solid fa-box-archive"
              placeholder: "fa-solid fa-box-archive"
              help: 归档页面图标，图标查找：https://fontawesome.com/search?o=r&m=free
            - $formkit: text
              name: iconTags
              label: 标签图标
              value: "fa-solid fa-tags"
              placeholder: "fa-solid fa-tags"
              help: 标签页面图标
            - $formkit: text
              name: iconCategories
              label: 分类图标
              value: "fa-solid fa-folder"
              placeholder: "fa-solid fa-folder"
              help: 分类页面图标
            - $formkit: text
              name: iconAbout
              label: 关于我图标
              value: "fa-solid fa-user"
              placeholder: "fa-solid fa-user"
              help: 关于我页面图标
            - $formkit: text
              name: iconMoments
              label: 碎碎念图标
              value: "fa-solid fa-book"
              placeholder: "fa-solid fa-book"
              help: 碎碎念页面图标
            - $formkit: text
              name: iconLinks
              label: 朋友们图标
              value: "fa-solid fa-link"
              placeholder: "fa-solid fa-link"
              help: 朋友们页面图标
            - $formkit: text
              name: iconGuestbook
              label: 留言板图标
              value: "fa-solid fa-comment"
              placeholder: "fa-solid fa-comment"
              help: 留言板页面图标
            - $formkit: text
              name: iconProjects
              label: 项目集图标
              value: "fa-brands fa-github"
              placeholder: "fa-brands fa-github"
              help: 项目集页面图标
            - $formkit: text
              name: iconPhotos
              label: 图库图标
              value: "fa-solid fa-images"
              placeholder: "fa-solid fa-images"
              help: 图库页面图标
            - $formkit: text
              name: iconFriendsCircle
              label: 朋友圈图标
              value: "fa-solid fa-camera"
              placeholder: "fa-solid fa-camera"
              help: 朋友圈页面图标
            - $formkit: text
              name: iconWishes
              label: 便签墙图标
              value: "fa-solid fa-note-sticky"
              placeholder: "fa-solid fa-note-sticky"
              help: 便签墙页面图标
            - $formkit: text
              name: iconEquipments
              label: 装备图标
              value: "fa-solid fa-toolbox"
              placeholder: "fa-solid fa-toolbox"
              help: 装备页面图标
        - $formkit: group
          name: loadingConfig
          label: 页面过渡动画
          value:
            enableLoading: false
            loadingGif: ""
          children:
            - $formkit: switch
              id: loading_enabled
              name: enableLoading
              label: 启用页面过渡动画
              value: false
              help: 开启后，点击站内链接跳转时会显示自定义 GIF 加载动画
            - $formkit: attachment
              name: loadingGif
              label: 加载动画 GIF
              if: $get(loading_enabled).value
              accepts:
                - "image/gif"
              help: 仅支持 GIF 格式，建议尺寸 120×120 以内，透明背景效果更佳
        - $formkit: repeater
          name: customNavIcons
          label: 自定义页面导航图标
          help: 为非主题内置模板的自定义页面配置导航图标。slug 填写页面 URL 中的路径，如 https://example.com/test 中的 test。配置后导航栏和风向标均会显示对应图标
          children:
            - $formkit: text
              name: slug
              label: 页面路径 (Slug)
              validation: required
              placeholder: "例如：test"
              help: 页面 URL 中的路径部分，如 /test 中的 test
            - $formkit: text
              name: icon
              label: 图标代码
              validation: required
              placeholder: "fa-solid fa-star"
              help: Font Awesome 图标类名，图标查找：https://fontawesome.com/search?o=r&m=free
            - $formkit: checkbox
              name: showInCompass
              label: 在风向标中显示
              value: true
              help: 是否在首页风向标区域显示此页面
        - $formkit: repeater
          name: categoryIcons
          label: 分类图标列表
          help: 为每个分类配置自定义图标和颜色，slug 填写分类 URL 中的路径，如 /categories/kai-fa 中的 kai-fa
          children:
            - $formkit: text
              name: slug
              label: 分类 Slug
              validation: required
              placeholder: "例如：kai-fa"
              help: 分类 URL 中的路径，如 /categories/kai-fa 中的 kai-fa
            - $formkit: text
              name: icon
              label: 图标类名
              placeholder: "fa-solid fa-folder"
              help: Font Awesome 图标，如 fa-solid fa-code
            - $formkit: text
              name: color
              label: 图标颜色
              placeholder: "#FF6B6B"
              help: 颜色如 #FF6B6B
        - $formkit: group
          name: loginSettings
          label: 登录设置
          value:
            hideLoginButton: false
            enableGatewayWallpaper: false
          children:
            - $formkit: checkbox
              name: hideLoginButton
              label: 隐藏前台登录按钮
              value: false
              help: 开启后将隐藏导航栏右侧的登录按钮
            - $formkit: switch
              name: enableGatewayWallpaper
              label: 启用登录页壁纸
              value: false
              help: 控制登录、注册、忘记密码等页面是否显示壁纸背景。开启后复用首页壁纸配置，默认关闭

    - group: hero
      label: 首页头部
      formSchema:
        - $formkit: group
          name: profileInfo
          label: 个人信息
          value:
            name: "Serenity"
            enableTypewriter: true
            enableTypewriterBackspace: false
            tagline: "热爱可抵岁月漫长"
            bio: "一个热爱技术、喜欢折腾的开发者。\n专注于前端开发，偶尔写写后端。\n记录生活，分享技术，探索未知。"
          children:
            - $formkit: text
              name: name
              label: 显示名称
              value: "Serenity"
              help: 显示在首页头像下方
            - $formkit: checkbox
              name: enableTypewriter
              label: 启用打字机效果
              value: true
              help: 为首页大标题添加打字机动画效果
            - $formkit: checkbox
              name: enableTypewriterBackspace
              label: 启用打字机回退效果
              value: false
              help: 打字完成后逐字回退再重新打字，形成循环动画。关闭则打完即停
            - $formkit: text
              name: tagline
              label: 个性标语
              value: "热爱可抵岁月漫长"
              help: 显示在名称下方的一句话介绍
            - $formkit: textarea
              name: bio
              label: 个人简介
              value: "一个热爱技术、喜欢折腾的开发者。\n专注于前端开发，偶尔写写后端。\n记录生活，分享技术，探索未知。"
              help: 显示在首页的详细介绍，支持多行
        - $formkit: group
          name: colorConfig
          label: 颜色自定义
          value:
            nameColor: ""
            taglineColor: ""
            bioColor: ""
            avatarGlowColor: ""
            weatherColor: ""
          children:
            - $formkit: text
              name: nameColor
              label: 显示名称颜色
              value: ""
              placeholder: "FF6B6B 或 linear-gradient(135deg, FF6B6B, FB966E)"
              help: "自定义显示名称的颜色，支持纯色（如 #FF6B6B）或渐变（如 linear-gradient(135deg, #F596AA, #FB966E)）。留空则使用主题默认颜色（随亮色/暗色切换）。设置后颜色固定，不随主题模式变化"
            - $formkit: text
              name: taglineColor
              label: 个性标语颜色
              value: ""
              placeholder: "333 或 linear-gradient(135deg, 667eea, 764ba2)"
              help: "自定义个性标语的颜色，支持纯色（如 #333333）或渐变（如 linear-gradient(135deg, #667eea, #764ba2)）。留空则使用主题默认颜色。设置后颜色固定，不随主题模式变化"
            - $formkit: text
              name: bioColor
              label: 个人简介颜色
              value: ""
              placeholder: "666 或 linear-gradient(135deg, f093fb, f5576c)"
              help: "自定义个人简介的颜色，支持纯色（如 #666666）或渐变（如 linear-gradient(135deg, #f093fb, #f5576c)）。留空则使用主题默认颜色。设置后颜色固定，不随主题模式变化"
            - $formkit: text
              name: avatarGlowColor
              label: 头像光晕颜色
              value: ""
              placeholder: "#FF6B6B"
              help: "自定义头像浮动光晕的颜色，只支持纯色（如 #FF6B6B）。留空则使用主题强调色"
            - $formkit: text
              name: weatherColor
              label: 天气文字颜色
              value: ""
              placeholder: "#FF6B6B 或 linear-gradient(135deg, #FF6B6B, #FB966E)"
              help: "自定义天气文字颜色。留空或纯色（如 #FF6B6B）为镂空描边效果，渐变（如 linear-gradient(135deg, #FF6B6B, #FB966E)）为渐变填充效果，鼠标悬停均填充"

    - group: welcome
      label: 欢迎页设置
      formSchema:
        - $formkit: group
          name: welcomeConfig
          label: 欢迎页设置
          value:
            enabled: true
            showMascot: true
            mascotDark: ""
            mascotLight: ""
            mascotCredit: "https://x.com/Seseren_kr"
            sayings: "点击任意处进入哦~\n欢迎来到我的小站~\n今天也要元气满满！\n很高兴见到你~"
          children:
            - $formkit: switch
              id: welcome_enabled
              name: enabled
              label: 启用欢迎页
              value: true
              help: 首次访问时显示全屏欢迎页，点击任意处进入主页
            - $formkit: checkbox
              name: showMascot
              label: 显示吉祥物
              value: true
              if: $get(welcome_enabled).value
              help: 在欢迎页右下角显示吉祥物动画
            - $formkit: attachment
              name: mascotDark
              label: 暗色模式吉祥物
              if: $get(welcome_enabled).value
              help: 上传暗色模式下显示的吉祥物 GIF/图片，留空则使用默认 Babara
            - $formkit: attachment
              name: mascotLight
              label: 亮色模式吉祥物
              if: $get(welcome_enabled).value
              help: 上传亮色模式下显示的吉祥物 GIF/图片，留空则使用默认 Kirara
            - $formkit: text
              name: mascotCredit
              label: 吉祥物来源链接
              value: "https://x.com/Seseren_kr"
              if: $get(welcome_enabled).value
              help: 吉祥物素材的来源链接，显示为 Twitter/X 图标，留空则不显示
            - $formkit: textarea
              name: sayings
              label: 吉祥物语录
              value: "点击任意处进入哦~\n欢迎来到我的小站~\n今天也要元气满满！\n很高兴见到你~"
              if: $get(welcome_enabled).value
              help: 吉祥物气泡随机显示的话语，每行一条

    - group: social
      label: 社交链接
      formSchema:
        - $formkit: repeater
          name: links
          label: 社交链接列表
          help: 添加你的社交媒体链接，支持自定义图标和链接
          value:
            - name: "GitHub"
              url: ""
              icon: "github"
            - name: "Twitter"
              url: ""
              icon: "twitter"
            - name: "Email"
              url: ""
              icon: "email"
          children:
            - $formkit: text
              name: name
              label: 名称
              validation: required
              help: 社交平台名称，如 GitHub、Twitter 等
            - $formkit: text
              name: url
              label: 链接
              validation: required
              help: 完整的链接地址，Email 请填写邮箱地址
            - $formkit: select
              name: icon
              label: 内置图标
              value: "github"
              options:
                - label: GitHub
                  value: github
                - label: Twitter / X
                  value: twitter
                - label: Email
                  value: email
                - label: 微博
                  value: weibo
                - label: 哔哩哔哩
                  value: bilibili
                - label: 知乎
                  value: zhihu
                - label: Telegram
                  value: telegram
                - label: Discord
                  value: discord
              help: 快速选择常见社交图标（当 Iconify 图标为空时使用）
            - $formkit: text
              name: iconifyIcon
              label: Iconify 图标
              placeholder: "mdi:github"
              help: "从 Iconify 图标库输入图标名称（如 mdi:github、ri:twitter-x-fill），可在 https://icon-sets.iconify.design 查找。优先级高于内置图标，留空则使用上方内置图标"
        - $formkit: group
          name: rssConfig
          label: RSS 订阅
          value:
            showRss: true
          children:
            - $formkit: checkbox
              name: showRss
              label: 显示 RSS 订阅
              value: true
              help: 在首页社交图标区域显示 RSS 订阅图标
        - $formkit: group
          name: sponsorConfig
          label: 赞助设置
          value:
            enableSponsor: false
            sponsorQrCode: ""
            sponsorTitle: "赞赏支持"
            sponsorText: "感谢你的支持 ❤️"
          children:
            - $formkit: switch
              id: social_enable_sponsor
              name: enableSponsor
              label: 启用赞助功能
              value: false
              help: 在首页社交图标最右边显示赞助图标
            - $formkit: attachment
              name: sponsorQrCode
              label: 赞助二维码
              if: $get(social_enable_sponsor).value
              help: 上传赞助二维码图片，鼠标悬停时显示
            - $formkit: text
              name: sponsorTitle
              label: 赞助标题
              value: "赞赏支持"
              if: $get(social_enable_sponsor).value
              help: 赞助悬浮层的标题
            - $formkit: text
              name: sponsorText
              label: 赞助说明
              value: "感谢你的支持 ❤️"
              if: $get(social_enable_sponsor).value
              help: 赞助悬浮层的说明文字

    - group: compass
      label: 风向标设置
      formSchema:
        - $formkit: group
          name: compassConfig
          label: 风向标设置
          value:
            enabled: true
            title: "风向标"
            subtitle: "快速导航到你想去的地方"
            showArchives: true
            showTags: true
            showCategories: true
            showAbout: true
            showMoments: true
            showLinks: true
            showGuestbook: true
            showProjects: true
            showPhotos: true
            showFriendsCircle: true
            showWishes: true
            showEquipments: true
          children:
            - $formkit: switch
              id: compass_enabled
              name: enabled
              label: 启用风向标
              value: true
              help: 是否在首页显示风向标导航区域
            - $formkit: text
              name: title
              label: 标题
              value: "风向标"
              if: $get(compass_enabled).value
            - $formkit: text
              name: subtitle
              label: 副标题
              value: "快速导航到你想去的地方"
              if: $get(compass_enabled).value
            - $formkit: switch
              name: showArchives
              label: 显示归档链接
              value: true
              if: $get(compass_enabled).value
            - $formkit: switch
              name: showTags
              label: 显示标签链接
              value: true
              if: $get(compass_enabled).value
            - $formkit: switch
              name: showCategories
              label: 显示分类链接
              value: true
              if: $get(compass_enabled).value
            - $formkit: switch
              name: showAbout
              label: 显示关于我链接
              value: true
              if: $get(compass_enabled).value
            - $formkit: switch
              name: showMoments
              label: 显示碎碎念链接
              value: true
              if: $get(compass_enabled).value
            - $formkit: switch
              name: showLinks
              label: 显示朋友们链接
              value: true
              if: $get(compass_enabled).value
            - $formkit: switch
              name: showGuestbook
              label: 显示留言板链接
              value: true
              if: $get(compass_enabled).value
            - $formkit: switch
              name: showProjects
              label: 显示项目集链接
              value: true
              if: $get(compass_enabled).value
            - $formkit: switch
              name: showPhotos
              label: 显示图库链接
              value: true
              if: $get(compass_enabled).value
            - $formkit: switch
              name: showFriendsCircle
              label: 显示朋友圈链接
              value: true
              if: $get(compass_enabled).value
            - $formkit: switch
              name: showWishes
              label: 显示便签墙链接
              value: true
              if: $get(compass_enabled).value
            - $formkit: switch
              name: showEquipments
