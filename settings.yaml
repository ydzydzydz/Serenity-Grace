        - $formkit: group
          name: termsConfig
          label: 服务条款
          children:
            - $formkit: switch
              id: footer_terms_enabled
              name: showTerms
              label: 显示服务条款
              value: true
              help: 在页脚显示服务条款链接
            - $formkit: textarea
              name: termsContent
              label: 服务条款内容
              value: ""
              help: 服务条款的详细内容，支持 Markdown 语法
              if: $get(footer_terms_enabled).value

