              placeholder: "https://www.api.com/meting/?server=tencent&type=playlist&id=7538846482"
              help: |
                支持自定义 Meting-API
                数据源 server: netease(网易云音乐)、tencent(QQ音乐)
                类型 type: song(单曲)、playlist(歌单)、albumlist(专辑列表)、search(搜索)
                类型 ID: 单曲/歌单 ID，搜索状态填 0
                搜索关键词 keyword（仅 search）: 如 泡沫、邓紫棋
                最高音质 br（仅 song/url）: 纯数字如 128标准音质 (MP3)、320极高音质 (MP3)、380无损音质 (Flac)、400Hi-Res (Flac)
            - $formkit: checkbox
              name: autoPlay
              if: $get(music_enabled).value
              label: 自动播放
              value: false
