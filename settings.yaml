          value: ""
          help: 点击 Logo 跳转的链接，留空则不可点击
        - $formkit: checkbox
          name: showPrivacy
          label: 显示隐私政策
          value: true
          help: 在页脚显示隐私政策链接
        - $formkit: textarea
          name: privacyContent
