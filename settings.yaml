            - $formkit: switch
              id: home_bg_enabled
              name: showHeroBackground
              label: 显示首页背景壁纸
              value: true
              help: 在首页第一屏显示背景壁纸，滚动时逐渐模糊消失。提示：为避免影响观感，建议背景壁纸和装饰图片只启用其一
            - $formkit: attachment
              name: heroBackgroundLight
              label: 亮色模式背景壁纸图片/视频
              help: 上传亮色模式壁纸（支持图片或 MP4/WebM 视频），留空则默认使用 lightbg.webp
              if: $get(home_bg_enabled).value
            - $formkit: attachment
              name: heroBackgroundDark
              label: 暗色模式背景壁纸图片/视频
              help: 上传暗色模式壁纸（支持图片或 MP4/WebM 视频），留空则默认使用 darkbg.webp
              if: $get(home_bg_enabled).value
            - $formkit: text
              name: heroBackgroundApi
              label: 桌面端背景 API
              value: ""
              help: 背景 API 地址，每行一个图片 URL，支持 API 返回多行 URL。设置后优先使用 API（覆盖亮/暗附件与默认图）
              if: $get(home_bg_enabled).value
            - $formkit: text
              name: heroBackgroundApiMobile
              label: 移动端背景 API
              value: ""
              help: 移动端专用 API，留空则使用桌面端 API
              if: $get(home_bg_enabled).value
        - $formkit: group
          name: decorConfig
          label: 主题装饰图片设置
          value:
            showThemeDecor: false
            customDecorLight: ""
            customDecorDark: ""
          children:
            - $formkit: switch
              id: home_decor_enabled
              name: showThemeDecor
              label: 显示主题装饰图片
              value: false
              help: 在首页头部显示主题切换的装饰图片。提示：为避免影响观感，建议背景壁纸和装饰图片只启用其一
            - $formkit: attachment
              name: customDecorLight
              label: 自定义亮色装饰图片
              help: 上传自定义的亮色模式装饰图片，留空则使用默认图片
              if: $get(home_decor_enabled).value
            - $formkit: attachment
              name: customDecorDark
              label: 自定义暗色装饰图片
              help: 上传自定义的暗色模式装饰图片，留空则使用默认图片
              if: $get(home_decor_enabled).value
        - $formkit: group
          name: weatherConfig
          label: 天气时钟设置
          value:
            showWeatherClock: false
            seniverseKey: ""
          children:
            - $formkit: switch
              id: home_weather_enabled
              name: showWeatherClock
              label: 显示天气时钟
              value: false
              help: 在首页头像下方显示时间、城市、天气、温度信息
            - $formkit: text
              name: seniverseKey
              label: 心知天气 API Key
              placeholder: 请输入心知天气 API Key
              help: 前往 https://www.seniverse.com 注册获取，免费版即可，自动根据访客 IP 定位
              if: $get(home_weather_enabled).value
        - $formkit: group
          name: recentPostsConfig
          label: 近期笔记
          value:
            showRecentPosts: false
          children:
            - $formkit: switch
              id: home_recent_posts_enabled
              name: showRecentPosts
              label: 显示近期笔记
              value: false
              help: 在首页显示最新文章列表
        - $formkit: group
          name: activityConfig
          label: 站点动态
          value:
            showActivity: false
          children:
            - $formkit: switch
              id: home_activity_enabled
              name: showActivity
              label: 显示站点动态
              value: false
              help: 在首页显示最新文章、碎碎念等动态流
        - $formkit: group
          name: memoCardsConfig
          label: 随想碎片
          value:
            showMemoCards: false
          children:
            - $formkit: switch
              id: home_memo_cards_enabled
              name: showMemoCards
              label: 显示随想碎片
              value: false
              help: 在首页显示随想碎片卡片轮播
        - $formkit: group
          name: lifeMomentsConfig
          label: 生活回想
          value:
            showLifeMoments: false
          children:
            - $formkit: switch
              id: home_life_moments_enabled
              name: showLifeMoments
              label: 显示生活回想
              value: false
              help: 在首页显示生活回想（碎碎念图片展示）

    - group: post
      label: 文章页面
      formSchema:
        - $formkit: repeater
          name: sidebarOrder
          label: 侧边栏组件顺序
          help: 拖动调整侧边栏组件的显示顺序
          value:
            - component: "toc"
              enabled: true
            - component: "author"
              enabled: true
            - component: "related"
              enabled: true
            - component: "tags"
              enabled: true
          children:
            - $formkit: select
              name: component
              label: 组件类型
              value: "toc"
              options:
                - label: 文章目录
                  value: toc
                - label: 作者信息
                  value: author
                - label: 相关文章
                  value: related
                - label: 热门标签
                  value: tags
              help: 选择侧边栏组件类型
            - $formkit: checkbox
              name: enabled
              label: 启用
              value: true
              help: 是否显示该组件
        - $formkit: group
          name: relatedConfig
          label: 相关文章设置
          value:
            showRelated: true
            relatedCount: 3
          children:
            - $formkit: switch
              id: post_related_enabled
              name: showRelated
              label: 显示相关文章
              value: true
              help: 在侧边栏显示相关文章组件
            - $formkit: number
              name: relatedCount
              label: 相关文章数量
              value: 3
              min: 2
              max: 6
              step: 1
              help: 相关文章组件显示的文章数量
              if: $get(post_related_enabled).value
        - $formkit: group
          name: scrollbarConfig
          label: 页面滚动条
          value:
            showScrollbar: false
          children:
            - $formkit: switch
              id: post_scrollbar_enabled
              name: showScrollbar
              label: 显示页面滚动条
              value: false
              help: 在文章详情页右侧显示一个跟随主题色的细滚动条，默认隐藏
        - $formkit: group
          name: outdatedNoticeConfig
          label: 文章过期提示
          value:
            showOutdatedNotice: true
          children:
            - $formkit: switch
              id: post_outdated_enabled
              name: showOutdatedNotice
              label: 显示文章过期提示
              value: true
              help: 文章发布超过一定天数后，在文章顶部显示"本文发布于 X 天前"的时效性提示
        - $formkit: group
          name: headingIconsConfig
          label: 标题装饰图标
          value:
            showHeadingIcons: true
          children:
            - $formkit: switch
              id: post_heading_icons_enabled
              name: showHeadingIcons
              label: 显示标题装饰图标
              value: true
              help: 在文章各级标题前显示云朵、太阳、叶子等装饰图标，文章页面也提供切换按钮
        - $formkit: group
          name: backgroundConfig
          label: 背景壁纸设置
          value:
            enableBackground: false
            backgroundApi: "https://api.elaina.cat/random"
            backgroundApiMobile: "https://api.elaina.cat/random/mobile"
            backgroundBlur: 3
          children:
            - $formkit: switch
              id: post_bg_enabled
              name: enableBackground
              label: 启用背景壁纸
              value: false
              help: 在文章详情页顶部显示随机背景壁纸
            - $formkit: text
              name: backgroundApi
              label: 背景壁纸 API
              value: "https://api.elaina.cat/random"
              help: 壁纸 API 地址，每行一个图片 URL，支持 API 返回多行 URL（每行一个）
              if: $get(post_bg_enabled).value
            - $formkit: text
              name: backgroundApiMobile
              label: 移动端壁纸 API
              value: "https://api.elaina.cat/random/mobile"
              help: 移动端专用 API，留空则使用桌面端 API
              if: $get(post_bg_enabled).value
            - $formkit: number
              name: backgroundBlur
              label: 背景模糊程度
              value: 3
              min: 0
              max: 20
              step: 1
              help: 背景图片的模糊程度，数值越大越模糊，0 为不模糊
              if: $get(post_bg_enabled).value
        - $formkit: group
          name: copyrightConfig
          label: 版权信息设置
          value:
            showCopyright: true
            copyrightText: "本文采用 <a href=\"https://creativecommons.org/licenses/by-nc-sa/4.0/\" target=\"_blank\" class=\"copyright-license\">CC BY-NC-SA 4.0</a> 许可协议，转载请注明出处。"
          children:
            - $formkit: switch
              id: post_copyright_enabled
              name: showCopyright
              label: 显示版权信息
              value: true
              help: 在文章底部显示版权声明
            - $formkit: textarea
              name: copyrightText
              label: 版权声明文字
              value: "本文采用 <a href=\"https://creativecommons.org/licenses/by-nc-sa/4.0/\" target=\"_blank\" class=\"copyright-license\">CC BY-NC-SA 4.0</a> 许可协议，转载请注明出处。"
              if: $get(post_copyright_enabled).value
        - $formkit: group
          name: shareConfig
          label: 分享按钮
          value:
            showShare: true
          children:
            - $formkit: switch
              id: post_share_enabled
              name: showShare
              label: 显示分享按钮
              value: true
              help: 在文章底部显示分享按钮（复制链接、微博、微信、QQ）
        - $formkit: group
          name: rewardConfig
          label: 打赏设置
          value:
            showReward: false
            rewardQrCode: ""
            rewardTitle: "赞赏支持"
            rewardText: "如果觉得文章对你有帮助，可以请作者喝杯咖啡 ☕"
          children:
            - $formkit: switch
              id: post_reward_enabled
              name: showReward
              label: 显示打赏组件
              value: false
              help: 在文章底部显示打赏组件
            - $formkit: attachment
              name: rewardQrCode
              label: 打赏二维码
              help: 上传打赏二维码图片
              if: $get(post_reward_enabled).value
            - $formkit: text
              name: rewardTitle
              label: 打赏标题
              value: "赞赏支持"
              help: 打赏组件的标题
              if: $get(post_reward_enabled).value
            - $formkit: textarea
              name: rewardText
              label: 打赏说明
              value: "如果觉得文章对你有帮助，可以请作者喝杯咖啡 ☕"
              help: 打赏组件的说明文字
              if: $get(post_reward_enabled).value

    - group: footer
      label: 页脚设置
      formSchema:
        - $formkit: group
          name: icpConfig
          label: ICP 备案设置
          value:
            showIcp: false
            icp: ""
            icpUrl: "https://beian.miit.gov.cn/"
            icpLogoUrl: ""
            icpLogoSize: 20
          children:
            - $formkit: switch
              id: footer_icp_enabled
              name: showIcp
              label: 显示 ICP 备案
              value: false
