          value:
            showOnlineStatus: true
          children:
            - $formkit: switch
              id: footer_online_status_enabled
              name: showOnlineStatus
              label: 开启页脚在线状态
              value: true
              help: 依赖 online-user 在线统计插件，在页脚展示连接状态、当前在线人数和活跃页面数；关闭后将隐藏该区域，并停止请求插件公开接口。
        - $formkit: group
          name: rssConfig
          label: RSS 订阅
          value:
            showRss: true
          children:
            - $formkit: switch
              id: footer_rss_enabled
              name: showRss
              label: 显示 RSS 订阅
              value: true
        - $formkit: group
          name: poweredByConfig
          label: Powered by
          value:
            showPoweredBy: true
          children:
            - $formkit: switch
              id: footer_powered_enabled
              name: showPoweredBy
              label: 显示 Powered by
              value: true
              help: 是否显示"由 Halo 驱动"
        - $formkit: group
          name: providerConfig
          label: 服务商标识
          value:
            showProvider: false
            providerLogo: ""
            providerName: ""
            providerUrl: ""
          children:
            - $formkit: switch
              id: footer_provider_enabled
              name: showProvider
              label: 显示服务商标识
              value: false
              help: 在页脚显示"本站由 [Logo] 提供支持"
            - $formkit: attachment
              name: providerLogo
