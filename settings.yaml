              help: 上传服务商的 Logo 图片
              if: $get(footer_provider_enabled).value
            - $formkit: text
              name: providerName
              label: 服务商名称
              value: ""
              help: 服务商名称，用于 alt 属性
              if: $get(footer_provider_enabled).value
            - $formkit: text
              name: providerUrl
              label: 服务商链接
              value: ""
              help: 点击 Logo 跳转的链接，留空则不可点击
              if: $get(footer_provider_enabled).value
        - $formkit: group
          name: privacyConfig
          label: 隐私政策
          value:
            showPrivacy: true
          children:
            - $formkit: switch
              id: footer_privacy_enabled
