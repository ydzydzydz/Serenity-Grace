<!doctype html>
<html
    xmlns:th="https://www.thymeleaf.org"
    th:replace="~{gateway_fragments/layout :: layout(title = |登录 - ${site.title}|, head = ~{::head}, body = ~{::body})}"
>
    <head>
        <script th:src="@{/assets/js/login.js}" defer></script>
    </head>
    
    <th:block th:fragment="body">
        <!-- 登录视图 -->
        <div class="gateway-view-panel active" id="view-login">
            <div class="form-header">
                <h2>登录</h2>
                <p>继续你的文学之旅</p>
            </div>

            <div th:replace="~{gateway_fragments/login::form}"></div>

            <div class="social-divider" th:if="${socialAuthProviders != null && !socialAuthProviders.isEmpty()}">
                <div class="divider-line"></div>
                <div class="divider-text"><span>快速关联</span></div>
            </div>
            <div class="social-buttons" th:if="${socialAuthProviders != null && !socialAuthProviders.isEmpty()}">
                <a th:each="provider : ${socialAuthProviders}"
                   th:href="${provider.authenticationUrl}"
                   class="social-btn">
                    <span th:text="${provider.displayName}">Provider</span>
                </a>
            </div>

            <div class="gateway-switch">
                <th:block th:if="${globalInfo.allowRegistration}">
                    尚未开启旅程？ <a th:href="@{/signup}">立即注册</a>
                </th:block>
            </div>
        </div>

        <!-- 忘记密码视图 -->
        <div class="gateway-view-panel" id="view-forgot">
            <button type="button" class="back-to-login" onclick="switchView('login')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                <span>返回登录</span>
            </button>

            <div class="form-header">
                <h2>找回密码</h2>
                <p>我们将向您的邮箱发送重置链接</p>
            </div>

            <form class="halo-form" id="reset-form">
                <input type="hidden" name="_csrf" id="reset-csrf" value="" />
                <div class="form-item">
                    <label for="reset-email">注册邮箱</label>
                    <div class="form-input">
                        <input type="email" id="reset-email" name="email" required autocomplete="email" placeholder="your@email.com" />
                    </div>
                </div>
                <div class="form-item">
                    <button type="submit">发送重置邮件</button>
                </div>
            </form>

            <div class="forgot-tip">
                <p>提示：如果您在 5 分钟内未收到邮件，请检查您的垃圾邮件文件夹或尝试重新发送。</p>
            </div>
        </div>
    </th:block>
</html>
