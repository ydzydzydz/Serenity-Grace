<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
    th:replace="~{modules/layout :: html(title = ${pageTitle ?: (singlePage != null ? singlePage.spec.title : '豆瓣')}, content = ~{::content}, head = ~{::head})}">
<th:block th:fragment="head">
    <link rel="stylesheet" th:href="@{/assets/css/douban.css}" />
    <script th:src="@{/assets/js/douban.js}" defer></script>
    <meta property="og:type" content="website" />
    <meta property="og:title"
        th:content="${(pageTitle ?: (singlePage != null ? singlePage.spec.title : '豆瓣')) + ' - ' + (theme.config.basic?.siteInfo?.title ?: site.title)}" />
    <meta property="og:description" th:content="${pageSubtitle ?: '豆瓣，记录你的生活'}" />
</th:block>
<th:block th:fragment="content">
    <main class="main">
        <div class="container">
            <section class="douban-page">
                <header class="douban-header" data-aos="fade-up">
                    <h1 class="douban-title"
                        th:text="${(theme.config.watermark?.douban?.enabled == true ? theme.config.watermark.douban.title : null) ?: '豆瓣'}">豆瓣</h1>
                    <p class="douban-subtitle"
                        th:text="${(theme.config.watermark?.douban?.enabled == true ? theme.config.watermark.douban.subtitle : null) ?: '记录你的生活'}">记录你的生活</p>
                </header>

                <div th:if="${doubanFinder == null}" class="plugin-notice" data-aos="fade-up">
                    <div class="plugin-notice-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 20h16M5 4h14M8 8h8a2 2 0 0 1 2 2v2a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2v-2a2 2 0 0 1 2-2m8 6l-2 6m-6-3l1 3" />
                        </svg>
                    </div>
                    <h3 class="plugin-notice-title">豆瓣功能需要安装插件</h3>
                    <p class="plugin-notice-desc">请先安装并启用「豆瓣」插件</p>
                </div>

                <th:block th:if="${doubanFinder != null}">
                    <div class="douban-container">
                        <nav class="douban-nav">
                            <div th:each="type : ${types}" class="douban-nav-item"
                                th:classappend="${type.key == 'movie' ? 'is-active' : ''}"
                                th:data-type="${type.key}"
                                th:text="${type.key}"></div>
                        </nav>

                        <div class="douban-status">
                            <div class="douban-status-item" data-status="mark">想看</div>
                            <div class="douban-status-item" data-status="doing">在看</div>
                            <div class="douban-status-item is-active" data-status="done">看过</div>
                        </div>

                        <div class="douban-genres"></div>
                        <div class="douban-list" data-type="movie"></div>

                        <div class="block-more block-more-centered">
                            <div class="lds-ripple u-hide"></div>
                        </div>
                    </div>
                </th:block>
            </section>
        </div>
    </main>
</th:block>
</html>
