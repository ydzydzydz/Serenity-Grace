<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
    th:replace="~{modules/layout :: html(title = ${pageTitle ?: (singlePage != null ? singlePage.spec.title : '豆瓣')}, content = ~{::content}, head = ~{::head})}">
<th:block th:fragment="head">
    <link rel="stylesheet" th:href="@{/assets/css/douban.css}" />
    <script th:src="@{/assets/js/douban.js}" defer></script>
    <meta property="og:type" content="website" />
    <meta property="og:title"
        th:content="${(pageTitle ?: (singlePage != null ? singlePage.spec.title : '豆瓣')) + ' - ' + (theme.config.basic != null and theme.config.basic.siteInfo != null and theme.config.basic.siteInfo.title != null ? theme.config.basic.siteInfo.title : site.title)}" />
    <meta property="og:description" th:content="${pageSubtitle ?: '豆瓣，记录你的生活，分享你的故事'}" />
</th:block>
<th:block th:fragment="content">
    <div class="container">
        <header class="page-header" data-aos="fade-up">
            <h1 class="page-title" th:text="${pageTitle ?: (singlePage != null ? singlePage.spec.title : '豆瓣')}">豆瓣
            </h1>
            <p class="page-desc" th:text="${pageSubtitle ?: '豆瓣，记录你的生活，分享你的故事'}">豆瓣，记录你的生活，分享你的故事</p>
        </header>

        <div th:if="${doubanFinder == null}" class="plugin-notice" data-aos="fade-up">
            <div class="plugin-notice-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path
                        d="M16.314 19.138h4.065a.62.62 0 0 1 .621.62v.621a.62.62 0 0 1-.62.621H3.62a.62.62 0 0 1-.62-.62v-.621a.62.62 0 0 1 .62-.621h3.754l-.96-3.104h2.19a.62.62 0 0 1 .59.425l.892 2.679H13.6l1.225-4.035H5.172a.62.62 0 0 1-.62-.62V7.345a.62.62 0 0 1 .62-.62h13.656a.62.62 0 0 1 .62.62v7.138a.62.62 0 0 1-.62.62h-1.289l-1.225 4.035zM3.931 3h16.138a.62.62 0 0 1 .62.62v.621a.62.62 0 0 1-.62.621H3.931a.62.62 0 0 1-.62-.62V3.62A.62.62 0 0 1 3.93 3zM7.19 8.586a.155.155 0 0 0-.156.155v4.035c0 .086.07.155.156.155h9.62c.086 0 .156-.07.156-.155V8.74a.155.155 0 0 0-.156-.155H7.19z" />
                </svg>
            </div>
            <h3 class="plugin-notice-title">豆瓣功能需要安装插件</h3>
            <p class="plugin-notice-desc">请先安装并启用「豆瓣」插件</p>
        </div>

        <th:block th:if="${doubanFinder != null}">
            <main class="main">
                <div class="layoutSingleColumn layoutSingleColumn--wide u-paddingTop50">
                    <th:block th:replace="~{plugin:plugin-douban:modules/douban}"></th:block>
                </div>
            </main>
        </th:block>
    </div>
</th:block>

</html>
