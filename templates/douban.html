<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      th:replace="~{modules/layout :: html(title = ${pageTitle ?: (singlePage != null ? singlePage.spec.title : '豆瓣')}, content = ~{::content}, head = ~{::head})}">
<th:block th:fragment="head">
    <link rel="stylesheet" th:href="@{/assets/css/douban.css}" />
    <script th:src="@{/assets/js/douban.js}" defer></script>
    <meta property="og:type" content="website" />
    <meta property="og:title"
        th:content="${(pageTitle ?: (singlePage != null ? singlePage.spec.title : '豆瓣')) + ' - ' + (theme.config.basic != null and theme.config.basic.siteInfo != null and theme.config.basic.siteInfo.title != null ? theme.config.basic.siteInfo.title : site.title)}" />
    <meta property="og:description" th:content="${pageSubtitle ?: '豆瓣，记录你的生活'}" />
</th:block>
<th:block th:fragment="content">
    <main class="main">
        <div class="container">
            <section class="douban-page">
                <div class="douban-header" data-aos="fade-up">
                    <h1 class="douban-title" th:text="${pageTitle ?: (singlePage != null ? singlePage.spec.title : '豆瓣')}">豆瓣</h1>
                    <p class="douban-subtitle" th:text="${pageSubtitle ?: '记录你的生活'}">记录你的生活</p>
                </div>

                <div th:if="${doubanFinder == null}" class="plugin-notice" data-aos="fade-up">
                    <div class="plugin-notice-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                    </div>
                    <h3 class="plugin-notice-title">豆瓣功能需要安装插件</h3>
                    <p class="plugin-notice-desc">请先安装并启用「豆瓣」插件</p>
                </div>

                <th:block th:if="${doubanFinder != null}">
                    <div class="douban-container">
                        <th:block th:replace="~{plugin:plugin-douban:modules/douban}"></th:block>
                    </div>
                </th:block>
            </section>
        </div>
    </main>
</th:block>
</html>
